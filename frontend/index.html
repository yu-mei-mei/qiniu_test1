<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 语音绘图工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 28px;
            color: #2d3436;
            font-weight: 600;
            letter-spacing: 2px;
        }

        .subtitle {
            color: #636e72;
            font-size: 14px;
            margin-top: 4px;
        }

        .canvas-wrapper {
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            padding: 16px;
        }

        canvas {
            display: block;
            background: #ffffff;
            border-radius: 8px;
            cursor: default;
            width: 800px;
            height: 600px;
        }

        /* 语音识别状态指示器 */
        .voice-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 16px;
            padding: 12px 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            min-width: 400px;
            justify-content: space-between;
        }

        .voice-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mic-icon {
            font-size: 20px;
            transition: all 0.3s ease;
        }

        .mic-icon.listening {
            color: #e74c3c;
            animation: pulse 1.2s ease-in-out infinite;
        }

        .mic-icon.idle {
            color: #b2bec3;
        }

        .mic-icon.error {
            color: #f39c12;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.15); opacity: 0.7; }
        }

        .status-text {
            font-size: 14px;
            color: #636e72;
        }

        .status-text.listening {
            color: #e74c3c;
            font-weight: 500;
        }

        /* 指令显示区 */
        .transcript-area {
            margin-top: 12px;
            padding: 14px 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            min-width: 400px;
            min-height: 50px;
            max-height: 120px;
            overflow-y: auto;
            font-size: 16px;
            color: #2d3436;
            line-height: 1.5;
        }

        .transcript-area .interim {
            color: #b2bec3;
        }

        .transcript-area .final {
            color: #2d3436;
        }

        .transcript-area .placeholder {
            color: #b2bec3;
            font-style: italic;
        }

        /* 指令历史 */
        .history-area {
            margin-top: 12px;
            padding: 14px 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            min-width: 400px;
            max-height: 150px;
            overflow-y: auto;
        }

        .history-area .title {
            font-size: 12px;
            color: #b2bec3;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .history-item {
            padding: 4px 0;
            font-size: 14px;
            color: #636e72;
            border-bottom: 1px solid #f5f5f5;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-item .time {
            color: #b2bec3;
            font-size: 12px;
            margin-right: 8px;
        }

        footer {
            margin-top: 20px;
            color: #b2bec3;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <header>
        <h1>🎨 AI 语音绘图工具</h1>
        <p class="subtitle">用声音描绘你的创意</p>
    </header>

    <div class="canvas-wrapper">
        <canvas id="drawCanvas" width="800" height="600"></canvas>
    </div>

    <!-- 语音状态指示器 -->
    <div class="voice-indicator">
        <div class="voice-status">
            <span class="mic-icon idle" id="micIcon">🎤</span>
            <span class="status-text" id="statusText">正在连接语音服务...</span>
        </div>
        <span id="langLabel" style="font-size:12px;color:#b2bec3;">中文普通话</span>
    </div>

    <!-- 当前识别 -->
    <div class="transcript-area" id="transcriptArea">
        <span class="placeholder">🎤 说话后这里会显示识别文字...</span>
    </div>

    <!-- 指令历史 -->
    <div class="history-area" id="historyArea">
        <div class="title">📋 指令历史</div>
    </div>

    <footer>
        Powered by Claude API · 语音识别 (Web Speech API)
    </footer>

    <script src="/static/app.js"></script>
    <script src="/static/drawer.js"></script>
</body>
</html>
