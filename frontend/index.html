<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 语音绘图工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 28px;
            color: #2d3436;
            font-weight: 600;
            letter-spacing: 2px;
        }

        .subtitle {
            color: #636e72;
            font-size: 14px;
            margin-top: 4px;
        }

        .canvas-wrapper {
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            padding: 16px;
        }

        canvas {
            display: block;
            background: #ffffff;
            border-radius: 8px;
            cursor: default;
            width: 800px;
            height: 600px;
        }

        .status-bar {
            margin-top: 16px;
            padding: 10px 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            color: #636e72;
            font-size: 14px;
            text-align: center;
            min-width: 400px;
        }

        footer {
            margin-top: 20px;
            color: #b2bec3;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <header>
        <h1>🎨 AI 语音绘图工具</h1>
        <p class="subtitle">用声音描绘你的创意</p>
    </header>

    <div class="canvas-wrapper">
        <canvas id="drawCanvas" width="800" height="600"></canvas>
    </div>

    <div class="status-bar" id="statusBar">
        💡 请启动后端服务后访问此页面
    </div>

    <footer>
        Powered by Claude API
    </footer>

    <script src="app.js"></script>
    <script src="drawer.js"></script>
</body>
</html>
